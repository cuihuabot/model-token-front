<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MBTI 性格测试 — 30题趣味版</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --purple: #9B59B6; --purple-dark: #6C3483; --purple-light: #D2B4DE;
      --green: #27AE60; --blue: #3498DB; --blue-dark: #2471A3;
      --gold: #F39C12; --orange: #E67E22; --red: #E74C3C;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans SC', sans-serif;
      background: #0D0D1A;
      color: #fff;
      min-height: 100vh;
      overflow-x: hidden;
    }
    /* Background blobs */
    .bg-blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.3;
      pointer-events: none;
      z-index: 0;
    }
    .bg-blob-1 { width: 600px; height: 600px; background: var(--purple); top: -200px; right: -100px; }
    .bg-blob-2 { width: 500px; height: 500px; background: var(--blue-dark); bottom: -150px; left: -100px; }
    .bg-blob-3 { width: 300px; height: 300px; background: var(--green); top: 40%; left: 60%; }
    /* Content */
    .content {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(155,89,182,0.2);
      border: 1px solid rgba(155,89,182,0.3);
      color: var(--purple-light);
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 24px;
      animation: fadeIn 0.6s ease 0.2s both;
    }
    .title {
      font-size: clamp(40px, 8vw, 72px);
      font-weight: 700;
      line-height: 1.1;
      text-align: center;
      margin-bottom: 20px;
      animation: fadeIn 0.6s ease 0.3s both;
    }
    .title-gradient {
      background: linear-gradient(135deg, var(--purple-light), var(--blue), var(--green));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .subtitle {
      font-size: clamp(16px, 3vw, 20px);
      color: rgba(255,255,255,0.6);
      text-align: center;
      max-width: 480px;
      line-height: 1.7;
      margin-bottom: 48px;
      animation: fadeIn 0.6s ease 0.4s both;
    }
    .cta-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 18px 40px;
      background: linear-gradient(135deg, var(--purple), var(--purple-dark));
      color: #fff;
      border-radius: 16px;
      font-size: 17px;
      font-weight: 600;
      text-decoration: none;
      box-shadow: 0 8px 32px rgba(155,89,182,0.4);
      transition: all 0.3s ease;
      animation: fadeIn 0.6s ease 0.5s both;
    }
    .cta-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 40px rgba(155,89,182,0.5);
    }
    /* Type showcase */
    .type-showcase {
      margin-top: 80px;
      text-align: center;
      animation: fadeIn 0.6s ease 0.6s both;
    }
    .type-showcase h3 {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.3);
      margin-bottom: 24px;
    }
    .type-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      max-width: 600px;
    }
    .type-pill {
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.5);
      transition: all 0.2s;
    }
    .type-pill:hover { border-color: var(--purple-light); color: var(--purple-light); }
    .type-pill.analyst { border-color: rgba(155,89,182,0.3); }
    .type-pill.diplomat { border-color: rgba(39,174,96,0.3); }
    .type-pill.guardian { border-color: rgba(52,152,219,0.3); }
    .type-pill.explorer { border-color: rgba(230,126,34,0.3); }
    /* Features */
    .features {
      display: flex;
      gap: 32px;
      margin-top: 60px;
      flex-wrap: wrap;
      justify-content: center;
      animation: fadeIn 0.6s ease 0.7s both;
    }
    .feature {
      text-align: center;
      max-width: 160px;
    }
    .feature-icon { font-size: 28px; margin-bottom: 8px; }
    .feature-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
    .feature-desc { font-size: 12px; color: rgba(255,255,255,0.4); line-height: 1.5; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="bg-blob bg-blob-1"></div>
  <div class="bg-blob bg-blob-2"></div>
  <div class="bg-blob bg-blob-3"></div>

  <div class="content">
    <div class="badge">✨ 30题趣味版 · 抽象画像</div>
    <h1 class="title">
      <span class="title-gradient">你的性格</span><br>藏着什么秘密？
    </h1>
    <p class="subtitle">
      通过30道生活场景题，发现你内心最真实的样子<br>
      找到属于你的抽象几何画像
    </p>
    <a href="quiz.html" class="cta-btn">
      开始测试 →
    </a>

    <div class="features">
      <div class="feature">
        <div class="feature-icon">🎯</div>
        <div class="feature-title">30题精选</div>
        <div class="feature-desc">从真实生活场景出发，拒绝无聊的选择题</div>
      </div>
      <div class="feature">
        <div class="feature-icon">🎨</div>
        <div class="feature-title">抽象画像</div>
        <div class="feature-desc">几何风格视觉呈现，看见你性格的另一面</div>
      </div>
      <div class="feature">
        <div class="feature-icon">⚡</div>
        <div class="feature-title">即时出结果</div>
        <div class="feature-desc">30题做完立即获得性格画像与详细解读</div>
      </div>
    </div>

    <div class="type-showcase">
      <h3>支持全部16种性格类型</h3>
      <div class="type-grid">
        <span class="type-pill analyst">INTJ</span><span class="type-pill analyst">INTP</span>
        <span class="type-pill analyst">ENTJ</span><span class="type-pill analyst">ENTP</span>
        <span class="type-pill diplomat">INFJ</span><span class="type-pill diplomat">INFP</span>
        <span class="type-pill diplomat">ENFJ</span><span class="type-pill diplomat">ENFP</span>
        <span class="type-pill guardian">ISTJ</span><span class="type-pill guardian">ISFJ</span>
        <span class="type-pill guardian">ESTJ</span><span class="type-pill guardian">ESFJ</span>
        <span class="type-pill explorer">ISTP</span><span class="type-pill explorer">ISFP</span>
        <span class="type-pill explorer">ESTP</span><span class="type-pill explorer">ESFP</span>
      </div>
    </div>
  </div>
</body>
</html>
