<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>今天吃什么？</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, rgba(255, 107, 107, 0.9), rgba(255, 159, 67, 0.9)),
                        url('https://picsum.photos/seed/food1774841741/1920/1080');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; min-height: 100vh; }
        .header {
            text-align: center; padding: 40px 20px;
            background: rgba(255,255,255,0.95); border-radius: 25px;
            margin-bottom: 25px; box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            border: 3px solid #ff6b6b;
        }
        .header h1 { font-size: 2.5em; color: #ff6b6b; margin-bottom: 15px; }
        .header .subtitle { font-size: 1.3em; color: #666; margin-bottom: 15px; }
        .location { font-size: 1.1em; color: #888; }
        .main-recommend {
            background: linear-gradient(135deg, #ff6b6b, #ff9f43);
            color: white; padding: 35px; border-radius: 20px;
            text-align: center; margin-bottom: 25px;
            box-shadow: 0 8px 30px rgba(255,107,107,0.4);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }
        .main-recommend .label { font-size: 1.2em; margin-bottom: 15px; opacity: 0.9; }
        .main-recommend .name { font-size: 2.8em; font-weight: bold; margin-bottom: 20px; }
        .main-recommend .recommend { font-size: 1.5em; margin-bottom: 20px; background: rgba(255,255,255,0.2); padding: 15px; border-radius: 10px; }
        .main-recommend .info { font-size: 1.2em; }
        .main-recommend .info span { margin: 0 15px; }
        .tags { text-align: center; margin-bottom: 25px; }
        .tag { display: inline-block; background: #fff; color: #ff6b6b; padding: 8px 20px; border-radius: 20px; margin: 5px; font-weight: bold; }
        .other-section { background: rgba(255,255,255,0.95); border-radius: 20px; padding: 25px; box-shadow: 0 5px 20px rgba(0,0,0,0.15); border: 3px solid #ff9f43; }
        .other-section h2 { font-size: 1.8em; color: #ff9f43; margin-bottom: 20px; text-align: center; }
        .restaurant-card {
            background: #f8f9fa; padding: 20px; border-radius: 15px;
            margin-bottom: 15px; border-left: 5px solid #ff9f43;
            transition: transform 0.3s ease;
        }
        .restaurant-card:hover { transform: translateX(10px); }
        .rest-name { font-size: 1.4em; font-weight: bold; color: #333; margin-bottom: 10px; }
        .rest-info { display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 10px; color: #666; }
        .info-item { background: #fff; padding: 5px 12px; border-radius: 15px; font-size: 0.95em; }
        .rest-recommend { font-size: 1em; color: #888; font-style: italic; }
        .refresh-btn {
            display: block; width: 100%; padding: 18px; font-size: 1.4em;
            font-weight: bold; color: white; background: linear-gradient(135deg, #ff6b6b, #ff9f43);
            border: none; border-radius: 20px; cursor: pointer; margin-top: 25px;
            transition: all 0.3s ease; box-shadow: 0 5px 20px rgba(255,107,107,0.4);
        }
        .refresh-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 30px rgba(255,107,107,0.6); }
        @media (max-width: 600px) { .header h1 { font-size: 1.8em; } .main-recommend .name { font-size: 2em; } .container { padding: 10px; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🍽️ 今天吃什么？</h1>
            <p class="subtitle">不知道吃什么？让我帮你选！</p>
            <p class="location">📍 通州新光大中心</p>
        </div>
        <div class="main-recommend">
            <div class="label">🎯 今日首推</div>
            <div class="name">真功夫</div>
            <div class="recommend">💡 香汁排骨套餐</div>
            <div class="info">
                <span>⭐ 4.2</span>
                <span>💰 25-40元</span>
                <span>📍 180m</span>
            </div>
        </div>
        <div class="tags">
            <span class="tag">#午餐</span>
            <span class="tag">#外卖</span>
            <span class="tag">#美味</span>
        </div>
        <div class="other-section">
            <h2>📋 其他推荐</h2>
            <div class="restaurant-card">
        <div class="rest-name">永和大王</div>
        <div class="rest-info">
            <span class="info-item">⭐ 4.1</span>
            <span class="info-item">💰 25-40元</span>
            <span class="info-item">📍 220m</span>
        </div>
        <div class="rest-recommend">推荐：卤肉饭套餐</div>
    </div><div class="restaurant-card">
        <div class="rest-name">麦当劳</div>
        <div class="rest-info">
            <span class="info-item">⭐ 4.5</span>
            <span class="info-item">💰 25-40元</span>
            <span class="info-item">📍 100m</span>
        </div>
        <div class="rest-recommend">推荐：麦辣鸡腿堡套餐</div>
    </div>
        </div>
        <button class="refresh-btn" onclick="location.reload()">🔄 再选一次</button>
    </div>
</body>
</html>
